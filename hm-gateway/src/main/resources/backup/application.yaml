server:
  port: 18088
spring:
  application:
    name: hm-gateway
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: 192.168.150.88:8848
      username: nacos
      password: nacos
      discovery:
        namespace: ${NACOS_NAMESPACE:28dfebff-7ab9-4c2b-9b42-07731076135e}  #命名空间
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: item-service
          # lb 负载均衡
          uri: lb://item-service
          predicates:
            - Path=/items/**,/search/**
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/carts/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**,/addresses/**
        - id: trade-service
          uri: lb://trade-service
          predicates:
            - Path=/orders/**
        - id: pay-service
          uri: lb://pay-service
          predicates:
            - Path=/pay-orders/**
hm:
  jwt:
    location: classpath:hmall.jks
    alias: hmall
    password: hmall123
    tokenTTL: 30m
  auth:
    excludePaths:
      - /search/**
      - /users/login
      - /items/**
      - /hi
      - /error
      - /favicon.ico
      - /v2/**
      - /v3/**
      - /swagger-resources/**
      - /webjars/**
      - /doc.html
logging:
  level:
    com.hmall: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: "logs/${spring.application.name}"
